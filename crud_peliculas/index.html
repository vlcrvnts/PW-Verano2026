<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CRUD de Películas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <h1>CRUD de Películas</h1>
   <form id="formulario">
        <input type="hidden" placeholder="ID" id="id">
        <input type="text" placeholder="Título" id="titulo">
        <input type="text" placeholder="Director" id="director">
        <input type="number" placeholder="Año" id="año">
        <button type="submit">Guardar</button>
   </form>
   
   <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Director</th>
                <th>Año</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaPeliculas"></tbody>
   </table>
   <script src="script.js"></script>
</body>
</html>
