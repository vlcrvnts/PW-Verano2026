<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Facebook - Iniciar sesión</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="contenedor-principal">
        
        <div class="principal">
            <h1>facebook</h1>
            <p>Facebook te ayuda a comunicarte y compartir con las personas que forman parte de tu vida.</p>
        </div>

        <div class="login">
            <div class="tarjeta-blanca">
                <form>
                    <input type="email" placeholder="Correo electrónico o número de teléfono" required>
                    <input type="password" placeholder="Contraseña">
                    
                    <button type="submit" class="btn-login">Iniciar sesión</button>
                    
                    <a href="#" class="link-olvido">¿Olvidaste tu contraseña?</a>
                    
                    <hr>
                    
                    <button type="button" class="btn-registro">Crear cuenta nueva</button>
                </form>
            </div>
            <p class="texto-pagina"><strong>Crea una página</strong> para una celebridad, una marca o un negocio.</p>
        </div> 

    </div>     
    
</body>
</html>
